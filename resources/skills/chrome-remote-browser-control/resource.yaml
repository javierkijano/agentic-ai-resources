id: chrome-remote-browser-control
kind: skill
status: active
description: Control Google Chrome via CDP (Chrome DevTools Protocol) for automation
  and browsing.
tags:
- '#chrome'
- '#browser'
- '#automation'
- '#cdp'
platforms:
- hermes
interfaces:
  cli:
    enabled: true
    commands:
      status: Check status
      exec: Execute
  webapp:
    enabled: false
    port: null
    entrypoint: app.py
storage:
  standard_layout: true
  description: Standardized runtime storage
  contract: core/docs/STORAGE.md
credentials: []
dependencies:
  resources: []
  system:
  - id: python
    version: '>=3.10'
  - id: google-chrome
  packages:
  - manager: pip
    name: playwright
dependents:
- x-remote-control
- linkedin
- google-workspace-assistant
usage_guidelines:
  preferred_scenarios:
  - Browser automation
  - Web scraping with JS execution
  - DOM manipulation
  constraints:
  - Requires a running Chrome instance with CDP enabled
  antipatterns:
  - Simple HTTP requests (use requests/curl instead)
  - Headless scraping of highly bot-protected sites
