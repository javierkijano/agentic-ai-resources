id: google-workspace-assistant
kind: skill
status: active
description: Assistant to manage Google Workspace (Gmail, Calendar, Drive) via Google API.
tags:
- google
- workspace
- productivity
- automation
platforms:
- hermes
interfaces:
  cli:
    enabled: True
    commands:
      status: Check status
      exec: Execute
  webapp:
    enabled: false
    port: null
    entrypoint: app.py
storage:
  standard_layout: true
  description: Standardized runtime storage
  contract: core/docs/STORAGE.md
credentials:
- id: GOOGLE_OAUTH_CREDENTIALS
  type: path
  description: Path to the credentials.json file from Google Cloud Console
  required: true
- id: GOOGLE_TOKEN_PATH
  type: path
  description: Path where the user access token (token.json) will be stored/read
  required: true
depends_on: []
