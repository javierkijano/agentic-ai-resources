id: repository-manager
kind: skill
status: active
description: Meta-skill to manage, validate, build, and navigate the entire Agentic
  Resources repository.
tags:
- '#meta'
- '#management'
- '#devops'
- '#navigation'
- '#documentation'
platforms:
- hermes
- generic
interfaces:
  cli:
    enabled: true
    commands:
      console: Open the interactive command center (menu.py)
      validate: Check repository integrity
      create: Create new resources
      build: Build platform distributions
      describe: Generate commit messages
  webapp:
    enabled: false
    port: null
    entrypoint: app.py
storage:
  standard_layout: true
  description: Standardized runtime storage
  contract: core/docs/STORAGE.md
credentials: []
dependencies:
  resources: []
  system:
  - id: python
    version: '>=3.10'
  packages: []
dependents:
- all-agents
usage_guidelines:
  preferred_scenarios:
  - General purpose usage
  constraints:
  - No specific constraints
  antipatterns:
  - Do not use without understanding the core logic
