id: x-remote-control
kind: skill
status: active
description: Control X (formerly Twitter) account, post tweets, and monitor interactions.
tags:
- '#x'
- '#twitter'
- '#social-media'
- '#automation'
platforms:
- hermes
interfaces:
  cli:
    enabled: true
    commands:
      status: Check status
      follow: Follow handles via search
      list: List following accounts
  webapp:
    enabled: false
    port: null
    entrypoint: app.py
storage:
  standard_layout: true
  description: Standardized runtime storage for account lists and browser sessions.
  contract: core/docs/STORAGE.md
credentials:
- id: X_CDP_URL
  type: url
  description: URL for the Chrome DevTools Protocol (CDP) endpoint
  required: true
- id: X_SESSION_COOKIE
  type: secret
  description: Authentication cookie (auth_token) for X if browser is not pre-authenticated
  required: false
dependencies:
  resources:
  - chrome-remote-browser-control
  - chrome-remote-browser-control
  system:
  - id: python
    version: '>=3.10'
  packages: []
dependents: []
usage_guidelines:
  preferred_scenarios:
  - General purpose usage
  constraints:
  - No specific constraints
  antipatterns:
  - Do not use without understanding the core logic
