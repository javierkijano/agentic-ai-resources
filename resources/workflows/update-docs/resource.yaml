id: update-docs
kind: workflow
status: active
description: Orquestación de actualización de documentación para recursos.
steps:
  - id: update_readme
    skill: resources-repo-manager
    command: generate-docs --target readme
  - id: update_registry
    skill: resources-repo-manager
    command: sync --registry index
  - id: notify_dependents
    shell: echo "Notificando a recursos dependientes..."
