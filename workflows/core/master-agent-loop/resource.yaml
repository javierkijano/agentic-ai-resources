id: master-agent-loop
kind: workflow
status: core
description: Bucle principal de interacción continua y resolución iterativa de tareas.
utility_score: 100

state_validation:
  pre_state_schema: "Topology"

steps:
  - id: analyze_user_request
    intent: "Analizar qué tipo de petición está realizando el usuario"
    validation:
      output_schema: "Workflow" # El resultado de identificar debe apuntar a un workflow válido
    associations:
      - workflow: task-identification
        strength: 1.0

  - id: strategic_critical_review
    intent: "Realizar una revisión crítica del plan"
    associations:
      - workflow: strategic-review
        strength: 1.0

  - id: present_execution_plan
    intent: "Mostrar al usuario la secuencia planificada"
    associations:
      - tool: workflow-planner
        strength: 1.0

  - id: execute_best_solution
    intent: "Orquestar el workflow seleccionado"
    associations:
      - tool: workflow-selector
        strength: 1.0

  - id: evaluate_and_learn
    intent: "Finalizar ciclo y evaluar procesos"
    associations:
      - workflow: workflow-evaluation
        strength: 1.0

  - id: recursive_documentation_closure
    intent: "Garantizar que todos los cambios realizados en el ciclo han sido documentados de forma atómica y recursiva"
    associations:
      - workflow: recursive-documentation
        strength: 1.0

  - id: continuous_improvement_loop
    intent: "Analizar el rendimiento y la integridad de la sesión para proponer mejoras evolutivas en el sistema"
    associations:
      - workflow: system-improvement-analysis
        strength: 1.0
